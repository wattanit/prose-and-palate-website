<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Book cover: The Lantern in the Hollow">
  <defs>
    <linearGradient id="cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a1411"/>
      <stop offset="1" stop-color="#3d0d0b"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="0.06" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.94" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- cloth background -->
  <rect width="800" height="1200" fill="url(#cloth)"/>
  <rect width="800" height="1200" fill="url(#spine)"/>
  <rect width="800" height="1200" fill="url(#vign)"/>

  <!-- decorative border frame -->
  <rect x="52" y="52" width="696" height="1096" fill="none" stroke="#caa45a" stroke-width="2.5"/>
  <rect x="66" y="66" width="668" height="1068" fill="none" stroke="#caa45a" stroke-width="1" opacity="0.7"/>

  <!-- top ornament -->
  <g transform="translate(400 200)" fill="none" stroke="#d8b56a" stroke-width="2.5">
    <path d="M -120 0 L -16 0"/>
    <path d="M 16 0 L 120 0"/>
    <circle cx="0" cy="0" r="13"/>
    <circle cx="0" cy="0" r="5" fill="#d8b56a" stroke="none"/>
    <path d="M -16 0 q 8 -10 16 0"/>
  </g>

  <!-- author -->
  <text x="400" y="300" text-anchor="middle" fill="#e7c987"
        font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="7">
    ELENA VOSS
  </text>

  <!-- title -->
  <text x="400" y="560" text-anchor="middle" fill="#f3ddab"
        font-family="'Playfair Display', Georgia, serif" font-weight="800" font-size="104" font-style="italic">
    <tspan x="400">The</tspan>
    <tspan x="400" dy="104">Lantern</tspan>
  </text>
  <text x="400" y="760" text-anchor="middle" fill="#caa45a"
        font-family="'Playfair Display', Georgia, serif" font-weight="500" font-size="78" letter-spacing="14">
    IN THE HOLLOW
  </text>

  <!-- center emblem: lantern -->
  <g transform="translate(400 905)">
    <g fill="none" stroke="#d8b56a" stroke-width="2.5">
      <path d="M 0 -70 V -40"/>
      <path d="M -34 -40 H 34 V 30 Q 34 48 0 48 Q -34 48 -34 30 Z"/>
      <path d="M -22 -26 H 22 V 26 Q 22 38 0 38 Q -22 38 -22 26 Z"/>
      <line x1="-30" y1="-8" x2="30" y2="-8"/>
      <path d="M 0 -40 V 60"/>
      <circle cx="0" cy="60" r="6" fill="#e7c987" stroke="none"/>
    </g>
    <g fill="#f3ddab">
      <circle cx="0" cy="2" r="9" opacity="0.9"/>
    </g>
  </g>

  <!-- bottom ornament -->
  <g transform="translate(400 1060)" fill="none" stroke="#d8b56a" stroke-width="2.5">
    <path d="M -120 0 L -16 0"/>
    <path d="M 16 0 L 120 0"/>
    <path d="M 0 -8 V 8"/>
    <path d="M -8 0 H 8"/>
  </g>

  <!-- publisher -->
  <text x="400" y="1115" text-anchor="middle" fill="#b8924c"
        font-family="Georgia, serif" font-size="22" letter-spacing="6">
    ASHENMOOR PRESS
  </text>

  <rect width="800" height="1200" fill="url(#cloth)" filter="url(#grain)" opacity="0.5"/>
</svg>
